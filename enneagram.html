  const TOTAL = questions.length;
  const progress = Math.round((Object.keys(answers).length / TOTAL) * 100);

  useEffect(() => {
    setFade(false);
    const t = setTimeout(() => setFade(true), 60);
    return () => clearTimeout(t);
  }, [current]);

  function handleAnswer(val) {
    const qId = questions[current].id;
    const newAns = { ...answers, [qId]: val };

    if (current < TOTAL - 1) {
      setTimeout(() => setCurrent(c => c + 1), 180);
    } else {
      calc(newAns);
    }
  }

      scores[t] = typeMapping[t].reduce((s, id) => s + (ans[id] || 0), 0);
    }
    const top = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
    setResult({ type: parseInt(top), scores });
    setScreen("result");
  }

  function restart() {
    setAnswers({}); setCurrent(0); setResult(null); setScreen("intro");
  }

  // ─── INTRO ───────────────────────────────────────────────
  if (screen === "intro") return (
    <div style={S.page}>
      <div style={S.center}>
        <span style={S.badge}>ENNEAGRAM DIAGNOSIS</span>
        <div style={{fontSize:72,margin:"20px 0 10px"}}>🧭</div>
        <h1 style={S.h1}>에니어그램<br/>성격 유형 진단</h1>
        <p style={S.sub}>81개의 문항으로 알아보는<br/>나의 진짜 성격 유형</p>
        <div style={S.infoRow}>
          {[["📝","81문항"],["⏱️","약 10분"],["🎯","9가지 유형"]].map(([ic,lb])=>(
            <div key={lb} style={S.infoItem}><span style={{fontSize:18}}>{ic}</span><span>{lb}</span></div>
          ))}
        </div>
        <p style={S.hint}>솔직하게 답할수록 더 정확한 결과를 얻을 수 있어요.<br/>현재의 나를 기준으로 응답해주세요.</p>
        <button style={S.startBtn} onClick={() => setScreen("quiz")}>진단 시작하기 →</button>
      </div>
    </div>
  );

  // ─── QUIZ ────────────────────────────────────────────────
  if (screen === "quiz") {
    const q = questions[current];
    return (
      <div style={S.page}>
        <div style={S.quizWrap}>
          {/* 진행 */}
          <div style={S.topBar}>
            <span style={S.qCnt}>{current+1} / {TOTAL}</span>
            <div style={S.bar}><div style={{...S.barFill, width:`${progress}%`}}/></div>
            <span style={S.pct}>{progress}%</span>
          </div>

          {/* 질문 */}
          <div style={{...S.card, opacity: fade?1:0, transform: fade?"translateY(0)":"translateY(10px)", transition:"all 0.28s ease"}}>
            <div style={S.qLabel}>Q{current+1}</div>
            <p style={S.qText}>{q.text}</p>
          </div>

          {/* 척도 */}
          <div style={S.scaleArea}>
            <div style={S.scaleTips}>
              <span>전혀 아니다</span><span>정말 그렇다</span>
            </div>
            <div style={S.btnRow}>
              {[1,2,3,4,5].map(val => {
                const sel = answers[q.id] === val;
                const sz = 42 + val*7;
                return (
                  <button key={val} onClick={() => handleAnswer(val)} style={{
                    ...S.scaleBtn,
                    width:sz, height:sz,
                    ...(sel ? S.scaleSel : {})
                  }}>{val}</button>
                );
              })}
            </div>
            <div style={S.lblRow}>
              {["전혀\n아니다","그렇지\n않다","그저\n그렇다","그런\n편이다","정말\n그렇다"].map((l,i)=>(
                <span key={i} style={S.lblTxt}>{l}</span>
              ))}
            </div>
          </div>

          {current > 0 && (
            <button style={S.prevBtn} onClick={() => setCurrent(c => c-1)}>← 이전 문항</button>
          )}
        </div>
      </div>
    );
  }

  // ─── RESULT ──────────────────────────────────────────────
  if (screen === "result" && result) {
    const info = typeInfo[result.type];
    const sorted = Object.entries(result.scores).sort((a,b)=>b[1]-a[1]);
    const max = 45;

    return (
      <div style={S.page}>
        <div style={S.resultWrap}>
          {/* 헤더 */}
          <div style={{...S.rHeader, background: info.bg}}>
            <div style={S.rBadge}>나의 에니어그램 유형</div>
            <div style={{fontSize:64, margin:"12px 0 8px"}}>{info.emoji}</div>
            <div style={{fontSize:14, fontWeight:700, opacity:.85, marginBottom:4}}>유형 {result.type}</div>
            <h2 style={S.rName}>{info.name}</h2>
            <div style={S.rKeyword}>#{info.keyword}</div>
          </div>

          {/* 설명 */}
          <div style={S.sec}>
            <p style={S.rDesc}>{info.desc}</p>
          </div>

          {/* 강점 */}
          <div style={S.sec}>
            <h3 style={S.secTitle}>✨ 나의 강점</h3>
            <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
              {info.strengths.map(s=>(
                <span key={s} style={{...S.tag, background:info.color+"22", color:info.color}}>{s}</span>
              ))}
            </div>
          </div>

          {/* 성장 포인트 */}
          <div style={S.sec}>
            <h3 style={S.secTitle}>🌱 성장 포인트</h3>
            <p style={S.growth}>{info.growth}</p>
          </div>

          {/* 점수 차트 */}
          <div style={S.sec}>
            <h3 style={S.secTitle}>📊 유형별 점수</h3>
            {sorted.map(([t, sc]) => {
              const ti = typeInfo[parseInt(t)];
              const pct = Math.round(sc/max*100);
              const isTop = parseInt(t) === result.type;
              return (
                <div key={t} style={S.scoreRow}>
                  <span style={S.scoreLabel}>{ti.emoji} {t}유형</span>
                  <div style={S.scoreTrack}>
                    <div style={{...S.scoreFill, width:`${pct}%`, background: isTop ? ti.color : "#ddd"}}/>
                  </div>
                  <span style={{...S.scoreNum, color: isTop ? ti.color:"#bbb", fontWeight: isTop?700:400}}>{sc}점</span>
                </div>
              );
            })}
          </div>

          {/* 9유형 지도 */}
          <div style={S.sec}>
            <h3 style={S.secTitle}>🗺️ 에니어그램 9가지 유형</h3>
            <div style={S.typeGrid}>
              {Object.entries(typeInfo).map(([t, ti]) => (
                <div key={t} style={{
                  ...S.typeCard,
                  border:`2px solid ${parseInt(t)===result.type ? ti.color:"#eee"}`,
                  background: parseInt(t)===result.type ? "#fafbff":"#fff",
                  boxShadow: parseInt(t)===result.type ? `0 4px 16px ${ti.color}33`:"none",
                }}>
                  <div style={{fontSize:22, marginBottom:4}}>{ti.emoji}</div>
                  <div style={{fontSize:10, color:"#9ca3af", fontWeight:700}}>{t}유형</div>
                  <div style={{fontSize:10, color:"#374151", fontWeight:700, lineHeight:1.3, marginTop:2}}>{ti.name}</div>
                </div>
              ))}
            </div>
          </div>

          <button style={S.restartBtn} onClick={restart}>🔄 다시 진단하기</button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── STYLES ──────────────────────────────────────────────────
const S = {
  page:{ minHeight:"100vh", display:"flex", justifyContent:"center", alignItems:"flex-start" },
  center:{ maxWidth:460, width:"100%", margin:"0 auto", padding:"48px 24px", textAlign:"center" },
  badge:{ display:"inline-block", background:"#5B4FE9", color:"#fff", fontSize:10, fontWeight:700, letterSpacing:2.5, padding:"4px 14px", borderRadius:20, marginBottom:24 },
  h1:{ fontSize:32, fontWeight:900, color:"#1a1a2e", lineHeight:1.3, margin:"0 0 12px" },
  sub:{ fontSize:16, color:"#6b7280", lineHeight:1.7, margin:"0 0 28px" },
  infoRow:{ display:"flex", justifyContent:"center", gap:20, marginBottom:24 },
  infoItem:{ display:"flex", alignItems:"center", gap:6, fontSize:14, color:"#374151", fontWeight:600 },
  hint:{ fontSize:13, color:"#9ca3af", lineHeight:1.8, marginBottom:36 },
  startBtn:{ width:"100%", padding:"18px", background:"linear-gradient(135deg,#5B4FE9,#8B5FE9)", color:"#fff", fontSize:17, fontWeight:700, border:"none", borderRadius:16, cursor:"pointer", boxShadow:"0 8px 24px rgba(91,79,233,.35)", letterSpacing:1 },

  quizWrap:{ maxWidth:460, width:"100%", margin:"0 auto", padding:"24px 20px", minHeight:"100vh", display:"flex", flexDirection:"column", gap:18 },
  topBar:{ display:"flex", alignItems:"center", gap:10 },
  qCnt:{ fontSize:13, fontWeight:700, color:"#5B4FE9", minWidth:50 },
  bar:{ flex:1, height:8, background:"#e5e7eb", borderRadius:4, overflow:"hidden" },
  barFill:{ height:"100%", background:"linear-gradient(90deg,#5B4FE9,#8B5FE9)", borderRadius:4, transition:"width .5s ease" },
  pct:{ fontSize:13, fontWeight:700, color:"#9ca3af", minWidth:35, textAlign:"right" },
  card:{ background:"#fff", borderRadius:20, padding:"28px 22px", boxShadow:"0 4px 20px rgba(0,0,0,.08)", minHeight:130, display:"flex", flexDirection:"column", gap:10 },
  qLabel:{ fontSize:11, fontWeight:800, color:"#5B4FE9", letterSpacing:2 },
  qText:{ fontSize:16, fontWeight:600, color:"#1f2937", lineHeight:1.7, margin:0 },

  scaleArea:{ display:"flex", flexDirection:"column", gap:10 },
  scaleTips:{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#9ca3af", fontWeight:500 },
  btnRow:{ display:"flex", justifyContent:"center", alignItems:"flex-end", gap:8 },
  scaleBtn:{ borderRadius:"50%", border:"2px solid #e5e7eb", background:"#fff", fontSize:14, fontWeight:700, color:"#6b7280", cursor:"pointer", transition:"all .2s ease", display:"flex", alignItems:"center", justifyContent:"center" },
  scaleSel:{ background:"linear-gradient(135deg,#5B4FE9,#8B5FE9)", borderColor:"#5B4FE9", color:"#fff", boxShadow:"0 4px 12px rgba(91,79,233,.4)" },
  lblRow:{ display:"flex", justifyContent:"space-between" },
  lblTxt:{ fontSize:9, color:"#d1d5db", textAlign:"center", flex:1, whiteSpace:"pre-line", lineHeight:1.3 },
  prevBtn:{ background:"none", border:"1.5px solid #e5e7eb", borderRadius:12, padding:"12px", fontSize:14, color:"#6b7280", cursor:"pointer", fontWeight:600 },

  resultWrap:{ maxWidth:460, width:"100%", margin:"0 auto", paddingBottom:48 },
  rHeader:{ padding:"48px 24px 36px", textAlign:"center", color:"#fff" },
  rBadge:{ display:"inline-block", background:"rgba(255,255,255,.25)", fontSize:11, fontWeight:700, letterSpacing:2, padding:"4px 14px", borderRadius:20, marginBottom:20 },
  rName:{ fontSize:26, fontWeight:900, margin:"0 0 12px" },
  rKeyword:{ display:"inline-block", background:"rgba(255,255,255,.2)", fontSize:13, padding:"4px 14px", borderRadius:20, fontWeight:600 },
  sec:{ padding:"18px 20px 0" },
  secTitle:{ fontSize:14, fontWeight:800, color:"#1f2937", marginBottom:10 },
  rDesc:{ fontSize:14, color:"#374151", lineHeight:1.8, margin:0, padding:"14px 16px", background:"#f9fafb", borderRadius:12 },
  tag:{ padding:"5px 13px", borderRadius:20, fontSize:12, fontWeight:700 },
  growth:{ fontSize:13, color:"#374151", lineHeight:1.8, margin:0, padding:"12px 14px", background:"#fffbeb", borderRadius:12, borderLeft:"4px solid #fbbf24" },

  scoreRow:{ display:"flex", alignItems:"center", gap:8, marginBottom:9 },
  scoreLabel:{ minWidth:78, fontSize:12, color:"#374151", fontWeight:600 },
  scoreTrack:{ flex:1, height:10, background:"#f3f4f6", borderRadius:5, overflow:"hidden" },
  scoreFill:{ height:"100%", borderRadius:5, transition:"width 1s ease" },
  scoreNum:{ minWidth:36, fontSize:12, textAlign:"right" },

  typeGrid:{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 },
  typeCard:{ padding:"12px 6px", borderRadius:14, textAlign:"center", cursor:"default" },
  restartBtn:{ display:"block", margin:"24px 20px 0", width:"calc(100% - 40px)", padding:"16px", background:"linear-gradient(135deg,#5B4FE9,#8B5FE9)", color:"#fff", fontSize:15, fontWeight:700, border:"none", borderRadius:14, cursor:"pointer", boxShadow:"0 6px 20px rgba(91,79,233,.3)" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
